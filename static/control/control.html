<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Agent - Control</title>
        <link rel="stylesheet" href="control.css">
    </head>
    <body>
        <h1>Agent - Control</h1>
        <div id="status-indicator" class="status-indicator">
            <span id="status-text">Connect...</span>
        </div>

        <!-- Einstellungen -->
        <div class="section">
            <h2>Settings</h2>
            <div class="toggle-row">
            <label><input type="checkbox" id="toggle-lipsync" checked /> LipSync</label>
            <label><input type="checkbox" id="toggle-emotion" checked /> Emotion</label>
            <label><input type="checkbox" id="toggle-llm" checked /> LLM-Modus</label>
            </div>
        </div>

        <!-- Eingabe -->
        <div class="section">
            <h2>Nachricht senden</h2>
            <div id="input-area">
            <input type="text" id="message-input" placeholder="Message Input..." />
            <button id="send-button">Send</button>
            </div>
        </div>

        <!-- Log -->
        <div class="section">
            <h2>Dialog</h2>
            <div id="log"></div>
        </div>

        <script src="control.js"></script>
    </body>
</html>
