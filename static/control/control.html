<!DOCTYPE html>
<html lang="de">
    <head>
        <charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Agent - Steuerung</title>
        <link rel="stylesheet" href="control.css">
    </head>
    <body>
        <h1>Agent - Steuerung</h1>

        <!-- Einstellungen -->
        <div class="section">
            <h2>Settings</h2>
            <div class="toggle-row">
            <label><input type="checkbox" id="toggle-lipsync" checked /> Lippensync</label>
            <label><input type="checkbox" id="toggle-emotion" checked /> Emotionsausdruck</label>
            <label><input type="checkbox" id="toggle-llm" checked /> LLM-Modus</label>
            </div>
        </div>

        <!-- Eingabe -->
        <div class="section">
            <h2>Nachricht senden</h2>
            <div id="input-area">
            <input type="text" id="message-input" placeholder="Message Input..." />
            <button id="send-button">Senden</button>
            </div>
        </div>

        <!-- Log -->
        <div class="section">
            <h2>Dialogverlauf</h2>
            <div id="log"></div>
        </div>

</html>
